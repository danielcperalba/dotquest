name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore RpgEngine.sln

      - name: Build
        run: dotnet build RpgEngine.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test RpgEngine.sln --no-build --configuration Release --verbosity normal
